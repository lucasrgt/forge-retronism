<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RetroNism Mod Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top toolbar -->
  <div id="toolbar">
    <div id="toolbar-left">
      <span class="toolbar-title">RetroNism Mod Maker</span>
      <div class="toolbar-group">
        <label>Name <input id="struct-name" type="text" value="Unnamed" class="input-sm"></label>
        <label>Type
          <select id="struct-type" class="input-sm">
            <option value="machine">Machine</option>
            <option value="tank">Tank</option>
            <option value="reactor">Reactor</option>
            <option value="custom">Custom</option>
          </select>
        </label>
      </div>
      <div class="toolbar-group">
        <label>W <input id="dim-w" type="number" value="3" min="3" max="9" class="input-xs"></label>
        <label>H <input id="dim-h" type="number" value="3" min="3" max="9" class="input-xs"></label>
        <label>D <input id="dim-d" type="number" value="3" min="3" max="9" class="input-xs"></label>
        <button id="btn-apply-dims" class="btn-sm">Apply</button>
      </div>
    </div>
    <div id="toolbar-right">
      <button id="btn-import" class="btn-sm">Import JSON</button>
      <button id="btn-export-json" class="btn-sm">Export JSON</button>
      <button id="btn-generate" class="btn-sm btn-primary">Generate Code</button>
      <button id="btn-export-mod" class="btn-sm btn-success">Export to Mod</button>
    </div>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Left panel -->
    <div id="left-panel">
      <!-- Tab buttons -->
      <div id="tab-buttons">
        <button class="tab-btn active" data-tab="structure">3D Structure</button>
        <button class="tab-btn" data-tab="gui">GUI Builder</button>
        <button class="tab-btn" data-tab="config">Config</button>
      </div>

      <!-- Structure tab content (block palette) -->
      <div id="tab-structure" class="tab-content active">
        <h3>Block Palette</h3>
        <div id="block-palette"></div>
        <hr>
        <h3>Layer Filter</h3>
        <div>
          <input id="layer-slider" type="range" min="-1" max="8" value="-1" style="width:100%">
          <span id="layer-label">All layers</span>
        </div>
        <hr>
        <h3>Tools</h3>
        <button id="btn-fill-shell" class="btn-sm btn-full">Fill Shell</button>
        <button id="btn-clear-blocks" class="btn-sm btn-full btn-danger">Clear All</button>
      </div>

      <!-- GUI tab content -->
      <div id="tab-gui" class="tab-content">
        <h3>GUI Components</h3>
        <div id="gui-component-palette"></div>
        <hr>
        <h3>Presets</h3>
        <select id="gui-preset-select" class="input-sm" style="width:100%">
          <option value="processor">Processor</option>
          <option value="dual_input">Dual Input</option>
          <option value="single_slot">Single Slot</option>
          <option value="tank">Tank</option>
        </select>
        <button id="btn-gui-preset" class="btn-sm btn-full">Load Preset</button>
        <button id="btn-gui-clear" class="btn-sm btn-full btn-danger">Clear</button>
      </div>

      <!-- Config tab content -->
      <div id="tab-config" class="tab-content">
        <h3>IO Types</h3>
        <label><input id="io-energy" type="checkbox" checked> Energy</label>
        <label><input id="io-fluid" type="checkbox"> Fluid</label>
        <label><input id="io-gas" type="checkbox"> Gas</label>
        <label><input id="io-item" type="checkbox" checked> Item</label>
        <hr>
        <h3>Capacities</h3>
        <label>Energy (RN) <input id="cap-energy" type="number" value="64000" class="input-sm"></label>
        <label>Fluid (mB) <input id="cap-fluid" type="number" value="0" class="input-sm"></label>
        <label>Gas (mB) <input id="cap-gas" type="number" value="0" class="input-sm"></label>
        <hr>
        <h3>Processing</h3>
        <label>Time (ticks) <input id="proc-time" type="number" value="200" class="input-sm"></label>
        <label>Energy/tick <input id="energy-tick" type="number" value="32" class="input-sm"></label>
        <hr>
        <h3>Block IDs</h3>
        <label>Controller ID <input id="block-id" type="number" value="213" min="200" max="255" class="input-sm"></label>
        <label>Casing ID <input id="casing-id" type="number" value="214" min="200" max="255" class="input-sm"></label>
      </div>
    </div>

    <!-- Center viewport -->
    <div id="viewport">
      <!-- 3D canvas renders here -->
      <div id="canvas-container"></div>
      <!-- GUI canvas (hidden unless GUI tab active) -->
      <div id="gui-canvas-container" style="display:none">
        <canvas id="gui-canvas" width="528" height="498"></canvas>
      </div>

      <div id="status-bar">
        <span id="status-text">Click on grid to place blocks. Right-click to select. Alt+drag to orbit.</span>
        <span id="mcp-status" style="color: #f87171; font-size: 12px; margin-left: 12px;">MCP: Offline</span>
        <span id="block-count">Blocks: 0</span>
      </div>
    </div>

    <!-- Right panel -->
    <div id="right-panel">
      <h3>Selection</h3>
      <div id="selection-info">No block selected</div>
      <div id="port-mode-group" style="display:none">
        <h3>Port Mode</h3>
        <select id="port-mode-select" class="input-sm">
          <option value="input">Input</option>
          <option value="output">Output</option>
          <option value="input_output">I/O</option>
        </select>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "../node_modules/three/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="gui-builder.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
